name: Validate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Validate PowerShell and bundled files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $required = @(
              'LettoreCNS.ps1',
              'Elenco-comuni-italiani.csv',
              'Elenco-comuni-italiani.csv.license',
              'LICENSE',
              'LICENSING.md',
              'NOTICE',
              'THIRD_PARTY_NOTICES.md',
              'CONTRIBUTOR_LICENSE_AGREEMENT.md',
              'lib/CIE.MRTD.SDK.dll',
              'lib/CIE.MRTD.SDK.dll.license',
              'lib/CIE.MRTD.SDK-CSPRNG.patch',
              'lib/CIE.MRTD.SDK-CSPRNG.patch.license',
              'lib/LICENSE-CIE-MRTD-SDK.txt'
          )
          foreach ($path in $required) {
              if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                  throw "Required file missing: $path"
              }
          }

          $tokens = $null
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path './LettoreCNS.ps1'),
              [ref]$tokens,
              [ref]$parseErrors
          ) | Out-Null
          if ($parseErrors.Count -gt 0) {
              $parseErrors | Format-List | Out-String | Write-Error
          }

          $licenseText = Get-Content './LICENSE' -Raw
          if ($licenseText -notmatch 'PolyForm Noncommercial License 1\.0\.0') {
              throw 'Unexpected or missing project license.'
          }
          $noticeText = Get-Content './NOTICE' -Raw
          if ($noticeText -notmatch "Required Notice: Copyright 2026 Simone D'Anna") {
              throw 'Required copyright notice missing.'
          }

          $licenseAssignments = @{
              './Elenco-comuni-italiani.csv.license' = 'SPDX-License-Identifier: CC-BY-4.0'
              './lib/CIE.MRTD.SDK.dll.license' = 'SPDX-License-Identifier: BSD-3-Clause'
              './lib/CIE.MRTD.SDK-CSPRNG.patch.license' = 'SPDX-License-Identifier: BSD-3-Clause'
          }
          foreach ($entry in $licenseAssignments.GetEnumerator()) {
              if ((Get-Content $entry.Key -Raw) -notmatch [regex]::Escape($entry.Value)) {
                  throw "Unexpected license assignment: $($entry.Key)"
              }
          }

          $expectedSdkHash = 'F1323F935CA4A236A7B772172AFBACB564223A007DD8F9C4E3DF67F7D56D9497'
          $actualSdkHash = (Get-FileHash './lib/CIE.MRTD.SDK.dll' -Algorithm SHA256).Hash
          if ($actualSdkHash -ne $expectedSdkHash) {
              throw "Unexpected CIE.MRTD.SDK.dll SHA-256: $actualSdkHash"
          }

          $encoding = [System.Text.Encoding]::GetEncoding(1252)
          $records = [System.IO.File]::ReadAllText(
              (Resolve-Path './Elenco-comuni-italiani.csv'),
              $encoding
          ) | ConvertFrom-Csv -Delimiter ';'
          if ($records.Count -lt 7000) {
              throw "Unexpected ISTAT dataset record count: $($records.Count)"
          }

          'Static validation completed.'
